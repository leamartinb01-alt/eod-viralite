<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0e0e10" />
<title>EOD · Viralité</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#0e0e10; --card:#17171b; --card2:#1f1f25; --line:#2b2b33;
    --gold:#d4af37; --gold-soft:#e8cf7e; --txt:#f3f1ea; --muted:#9b9aa3;
    --green:#34c759; --red:#ff453a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.45; padding-bottom:90px;
  }
  a{color:var(--gold)}
  .wrap{max-width:680px; margin:0 auto; padding:18px 16px}
  header.top{display:flex; align-items:center; gap:12px; padding:18px 16px 8px; max-width:680px; margin:0 auto}
  .logoV{
    width:40px; height:40px; border-radius:10px; flex:0 0 40px;
    background:linear-gradient(145deg,#1d1d22,#101013);
    border:1px solid var(--gold); display:flex; align-items:center; justify-content:center;
    color:var(--gold); font-weight:800; font-size:22px; font-family:Georgia,serif;
  }
  .logo-eco-sm{width:40px; height:40px; flex:0 0 40px; border-radius:10px; overflow:hidden; display:block; box-shadow:0 0 0 1px var(--line)}
  .logo-eco-big{width:96px; height:96px; border-radius:24px; overflow:hidden; display:block; margin:0 auto 14px; box-shadow:0 0 0 1px var(--line)}
  header.top h1{font-size:18px; margin:0; letter-spacing:.5px}
  header.top .sub{font-size:12px; color:var(--muted)}

  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px; margin:14px 0}
  h2{font-size:16px; margin:0 0 12px}
  label{display:block; font-size:13px; color:var(--muted); margin:14px 0 6px}
  input,select,textarea{
    width:100%; background:var(--card2); border:1px solid var(--line); color:var(--txt);
    border-radius:12px; padding:13px 14px; font-size:16px; outline:none; font-family:inherit;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--gold)}
  textarea{min-height:80px; resize:vertical}
  .btn{
    width:100%; border:none; border-radius:14px; padding:15px; font-size:16px; font-weight:700;
    background:linear-gradient(145deg,var(--gold),var(--gold-soft)); color:#1a1500; cursor:pointer; margin-top:18px;
  }
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:transparent; border:1px solid var(--line); color:var(--txt); font-weight:600}
  .row2{display:flex; gap:10px}
  .row2>div{flex:1}
  .hint{font-size:12px; color:var(--muted); margin-top:6px}
  .pill{display:inline-block; font-size:11px; padding:3px 9px; border-radius:999px; border:1px solid var(--line); color:var(--muted)}
  .pill.closer{color:var(--gold); border-color:var(--gold)}
  .pill.setter_insta{color:#ff8fd0; border-color:#ff8fd0}
  .pill.setter_linkedin{color:#5aa9ff; border-color:#5aa9ff}
  .pill.coach{color:var(--green); border-color:var(--green)}
  .msg{padding:12px 14px; border-radius:12px; font-size:14px; margin-top:12px; display:none}
  .msg.ok{background:rgba(52,199,89,.12); color:var(--green); display:block}
  .msg.err{background:rgba(255,69,58,.12); color:var(--red); display:block}

  /* bottom nav */
  .nav{
    position:fixed; bottom:0; left:0; right:0; background:rgba(14,14,16,.92);
    backdrop-filter:blur(10px); border-top:1px solid var(--line); display:flex; z-index:50;
  }
  .nav button{flex:1; background:none; border:none; color:var(--muted); padding:12px 4px 18px; font-size:12px; cursor:pointer}
  .nav button.active{color:var(--gold)}
  .nav .ic{display:block; font-size:20px; margin-bottom:2px}

  /* dashboard */
  .filters{display:flex; gap:8px; margin-bottom:10px}
  .filters select{padding:10px}
  .entry{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin:10px 0}
  .entry .eh{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px}
  .entry .who{font-weight:700}
  .entry .when{font-size:12px; color:var(--muted)}
  .kv{display:flex; justify-content:space-between; font-size:14px; padding:5px 0; border-top:1px dashed var(--line)}
  .kv .k{color:var(--muted); padding-right:10px}
  .kv .v{text-align:right; font-weight:600}
  .stat{display:flex; gap:10px; margin:6px 0 16px}
  .stat .box{flex:1; background:var(--card2); border:1px solid var(--line); border-radius:12px; padding:12px; text-align:center}
  .stat .n{font-size:22px; font-weight:800; color:var(--gold)}
  .stat .l{font-size:11px; color:var(--muted)}
  .empty{color:var(--muted); text-align:center; padding:30px 0; font-size:14px}
  .center{min-height:80vh; display:flex; flex-direction:column; justify-content:center}
  .hide{display:none !important}
  .config-warn{background:rgba(212,175,55,.1); border:1px solid var(--gold); color:var(--gold-soft); font-size:13px; padding:12px; border-radius:12px; margin:10px 0}
</style>
</head>
<body>

<!-- ============ LOGO V Viralité (même charte que logo_E / logo_M) ============ -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="logoV" viewBox="0 0 1024 1024">
    <defs>
      <radialGradient id="v_glow1" cx="80%" cy="22%" r="55%">
        <stop offset="0%" stop-color="#ff7a3d" stop-opacity="0.60"/>
        <stop offset="30%" stop-color="#ff7a3d" stop-opacity="0.18"/>
        <stop offset="60%" stop-color="#ff7a3d" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="v_glow2" cx="15%" cy="82%" r="62%">
        <stop offset="0%" stop-color="#7f5bc4" stop-opacity="0.55"/>
        <stop offset="32%" stop-color="#7f5bc4" stop-opacity="0.12"/>
        <stop offset="65%" stop-color="#7f5bc4" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="v_centerGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ff7a3d" stop-opacity="0.32"/>
        <stop offset="60%" stop-color="#ff7a3d" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#ff7a3d" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <rect width="1024" height="1024" fill="#1a1410"/>
    <rect width="1024" height="1024" fill="url(#v_glow1)"/>
    <rect width="1024" height="1024" fill="url(#v_glow2)"/>
    <g transform="rotate(-90 512 512)">
      <circle cx="512" cy="512" r="380" fill="none" stroke="#ff7a3d" stroke-width="68" stroke-dasharray="336 2052"/>
      <circle cx="512" cy="512" r="380" fill="none" stroke="#ff8b47" stroke-width="68" stroke-dasharray="336 2052" stroke-dashoffset="-341.1"/>
      <circle cx="512" cy="512" r="380" fill="none" stroke="#f25e3d" stroke-width="68" stroke-dasharray="336 2052" stroke-dashoffset="-682.3"/>
      <circle cx="512" cy="512" r="380" fill="none" stroke="#e04c6b" stroke-width="68" stroke-dasharray="336 2052" stroke-dashoffset="-1023.4"/>
      <circle cx="512" cy="512" r="380" fill="none" stroke="#c5468c" stroke-width="68" stroke-dasharray="336 2052" stroke-dashoffset="-1364.6"/>
      <circle cx="512" cy="512" r="380" fill="none" stroke="#9d4db0" stroke-width="68" stroke-dasharray="336 2052" stroke-dashoffset="-1705.7"/>
      <circle cx="512" cy="512" r="380" fill="none" stroke="#7f5bc4" stroke-width="68" stroke-dasharray="336 2052" stroke-dashoffset="-2046.9"/>
    </g>
    <circle cx="512" cy="512" r="250" fill="url(#v_centerGlow)"/>
    <text x="512" y="638" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="320" fill="#ffffff" letter-spacing="-8">V</text>
  </symbol>
</svg>

<!-- ============ LOGIN ============ -->
<div id="login" class="wrap center">
  <div style="text-align:center; margin-bottom:18px">
    <svg class="logo-eco-big"><use href="#logoV"/></svg>
    <h1 style="margin:0; font-size:22px">EOD Viralité</h1>
    <div style="color:var(--muted); font-size:13px; margin-top:4px">Le récap de fin de journée de la team</div>
  </div>
  <div class="card">
    <label>Mot de passe d'équipe</label>
    <input id="pw" type="password" placeholder="••••••" autocomplete="off" />
    <button class="btn" onclick="login()">Entrer</button>
    <div id="loginErr" class="msg"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hide">
  <header class="top">
    <svg class="logo-eco-sm"><use href="#logoV"/></svg>
    <div>
      <h1>EOD Viralité</h1>
      <div class="sub" id="todayLabel"></div>
    </div>
  </header>

  <!-- ---- VIEW: FORM ---- -->
  <div id="view-form" class="wrap">
    <div id="cfgWarn" class="config-warn hide">
      ⚠️ Backend pas encore configuré — les EOD ne seront pas sauvegardés tant que la connexion Firebase n'est pas renseignée (voir le guide d'installation).
    </div>
    <div class="card">
      <h2>Faire mon EOD</h2>
      <label>Qui es-tu ?</label>
      <select id="member" onchange="onMember()"></select>

      <label>Date de l'EOD</label>
      <input id="rdate" type="date" />

      <div id="fields"></div>

      <button class="btn" onclick="submitEod()">Envoyer mon EOD ✓</button>
      <div id="formMsg" class="msg"></div>
      <div class="hint" style="text-align:center; margin-top:14px">Ça prend 2 min. Merci 🙏</div>
    </div>
  </div>

  <!-- ---- VIEW: DASHBOARD ---- -->
  <div id="view-dash" class="wrap hide">
    <div class="card">
      <h2>Suivi de la team</h2>
      <div class="filters">
        <select id="fMember"><option value="">Tout le monde</option></select>
        <select id="fDate">
          <option value="today">Aujourd'hui</option>
          <option value="7">7 derniers jours</option>
          <option value="30">30 derniers jours</option>
          <option value="all">Tout</option>
        </select>
      </div>
      <div class="stat" id="stats"></div>
      <button class="btn ghost" onclick="loadDash()">↻ Rafraîchir</button>
    </div>
    <div id="entries"></div>
  </div>
</div>

<!-- ============ NAV ============ -->
<div id="nav" class="nav hide">
  <button id="nav-form" class="active" onclick="show('form')"><span class="ic">✍️</span>Mon EOD</button>
  <button id="nav-dash" onclick="show('dash')"><span class="ic">📊</span>Suivi</button>
</div>

<script>
/* ====================================================================
   CONFIGURATION  —  À REMPLIR (voir GUIDE_INSTALLATION.md)
   ==================================================================== */
const CONFIG = {
  // 1) Backend Firebase (gratuit). Copie/colle l'objet de config Firebase ici.
  //    (Console Firebase > Paramètres du projet > tes apps > SDK config)
  FIREBASE : {
    apiKey:            "AIzaSyB4_Oaw4vnZ6pPUqbuV0gki2SsnMm050fw",
    authDomain:        "ecosysteme-viral.firebaseapp.com",
    projectId:         "ecosysteme-viral",
    storageBucket:     "ecosysteme-viral.firebasestorage.app",
    messagingSenderId: "605349501477",
    appId:             "1:605349501477:web:8659ddb89f1f512d92fdcc",
  },

  // 2) Mot de passe d'équipe (le "mot de passe bidon")
  PASSWORD : "viralite2026",

  // 3) La team. role = closer | setter_insta | setter_linkedin | coach
  TEAM : [
    { name:"Julie LB",       role:"closer" },
    { name:"Anthony LB",     role:"closer" },
    { name:"Ilyas",          role:"setter_insta" },
    { name:"Lucas Reverdy",  role:"setter_linkedin" },
    // { name:"Nom du coach", role:"coach" },
  ],
};

/* ---- Définition des champs par rôle ---- */
const ROLE_LABEL = {
  closer:"Closer", setter_insta:"Setter Instagram",
  setter_linkedin:"Setter LinkedIn", coach:"Coach",
};
const SETTER_FIELDS = [
  { key:"contacted",   label:"Nombre de personnes contactées", type:"number" },
  { key:"in_contact",  label:"Nombre de personnes en contact", type:"number" },
  { key:"calls_booked",label:"Nombre de calls pris",           type:"number" },
  { key:"feeling",     label:"Ressenti & remarque si besoin",  type:"textarea" },
];
const FORMS = {
  closer:[
    { key:"calls",            label:"Nombre de calls sur la journée", type:"number" },
    { key:"noshow",           label:"No-show ? (combien)",            type:"number" },
    { key:"showup_insta",     label:"Noms des calls show-up — Instagram", type:"textarea" },
    { key:"showup_linkedin",  label:"Noms des calls show-up — LinkedIn",  type:"textarea" },
    { key:"closed",           label:"Nombre de closé",                type:"number" },
    { key:"cash_day",         label:"Cash collecté (€) — aujourd'hui",type:"number" },
    { key:"cash_month",       label:"Cash collecté (€) — depuis début du mois", type:"number" },
    { key:"followup_next",    label:"Nb & noms des follow-up des prochains jours", type:"textarea" },
    { key:"followup_update",  label:"Update sur les follow-up du jour", type:"textarea" },
    { key:"feeling",          label:"Ressenti de la journée — remarque si besoin", type:"textarea" },
  ],
  setter_insta:SETTER_FIELDS,
  setter_linkedin:SETTER_FIELDS,
  coach:SETTER_FIELDS,
};

/* ==================================================================== */
const $ = id => document.getElementById(id);
const todayStr = () => new Date().toISOString().slice(0,10);

/* ---------- Firebase ---------- */
let db = null;
function fbReady(){ return !!(CONFIG.FIREBASE && CONFIG.FIREBASE.projectId && CONFIG.FIREBASE.apiKey); }
function initFirebase(){
  if(db || !fbReady()) return;
  firebase.initializeApp(CONFIG.FIREBASE);
  db = firebase.firestore();
}

/* ---------- LOGIN ---------- */
function login(){
  const v = $("pw").value.trim();
  if(v === CONFIG.PASSWORD){
    $("login").classList.add("hide");
    $("app").classList.remove("hide");
    $("nav").classList.remove("hide");
    initApp();
  } else {
    const e = $("loginErr"); e.className="msg err"; e.textContent="Mot de passe incorrect.";
  }
}
$("pw").addEventListener("keydown", e=>{ if(e.key==="Enter") login(); });

/* ---------- INIT ---------- */
function initApp(){
  const d = new Date();
  $("todayLabel").textContent = d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
  $("rdate").value = todayStr();
  // membres
  const sel = $("member"), fil = $("fMember");
  CONFIG.TEAM.forEach(m=>{
    sel.insertAdjacentHTML("beforeend", `<option value="${m.name}">${m.name}</option>`);
    fil.insertAdjacentHTML("beforeend", `<option value="${m.name}">${m.name}</option>`);
  });
  initFirebase();
  if(!fbReady()) $("cfgWarn").classList.remove("hide");
  onMember();
}

function memberRole(name){ const m = CONFIG.TEAM.find(x=>x.name===name); return m? m.role : "setter_insta"; }

function onMember(){
  const role = memberRole($("member").value);
  const box = $("fields"); box.innerHTML = "";
  box.insertAdjacentHTML("beforeend",
    `<div style="margin-top:14px"><span class="pill ${role}">${ROLE_LABEL[role]}</span></div>`);
  FORMS[role].forEach(f=>{
    const inp = f.type==="textarea"
      ? `<textarea id="f_${f.key}" placeholder="..."></textarea>`
      : `<input id="f_${f.key}" type="${f.type}" inputmode="${f.type==='number'?'numeric':'text'}" placeholder="${f.type==='number'?'0':'...'}" />`;
    box.insertAdjacentHTML("beforeend", `<label>${f.label}</label>${inp}`);
  });
}

/* ---------- SUBMIT ---------- */
async function submitEod(){
  const name = $("member").value, role = memberRole(name), rdate = $("rdate").value;
  const payload = {};
  FORMS[role].forEach(f=>{ payload[f.key] = ($("f_"+f.key).value || "").trim(); });
  const msg = $("formMsg");

  if(!fbReady()){
    msg.className="msg err"; msg.textContent="Backend non configuré : impossible d'enregistrer (voir guide d'installation).";
    return;
  }
  initFirebase();
  msg.className="msg"; msg.style.display="block"; msg.textContent="Envoi…";
  try{
    await db.collection("eod_reports").add({
      report_date: rdate,
      member: name,
      role: role,
      payload: payload,
      created_at: firebase.firestore.FieldValue.serverTimestamp(),
    });
    msg.className="msg ok"; msg.textContent="EOD envoyé ✓ Merci !";
    FORMS[role].forEach(f=>{ $("f_"+f.key).value=""; });
  }catch(err){
    msg.className="msg err"; msg.textContent="Erreur d'envoi : "+err.message;
  }
}

/* ---------- NAV ---------- */
function show(v){
  $("view-form").classList.toggle("hide", v!=="form");
  $("view-dash").classList.toggle("hide", v!=="dash");
  $("nav-form").classList.toggle("active", v==="form");
  $("nav-dash").classList.toggle("active", v==="dash");
  if(v==="dash") loadDash();
}

/* ---------- DASHBOARD ---------- */
let CACHE = [];
async function loadDash(){
  const wrap = $("entries");
  if(!fbReady()){
    wrap.innerHTML = `<div class="empty">Backend non configuré.<br>Renseigne Firebase pour voir les EOD.</div>`;
    $("stats").innerHTML=""; return;
  }
  initFirebase();
  wrap.innerHTML = `<div class="empty">Chargement…</div>`;
  try{
    const snap = await db.collection("eod_reports").orderBy("created_at","desc").limit(500).get();
    CACHE = snap.docs.map(d=>d.data());
    renderDash();
  }catch(err){
    wrap.innerHTML = `<div class="empty">Erreur de chargement : ${err.message}</div>`;
  }
}
function renderDash(){
  const fm = $("fMember").value, fd = $("fDate").value;
  let rows = CACHE.slice();
  if(fm) rows = rows.filter(x=>x.member===fm);
  if(fd==="today") rows = rows.filter(x=>x.report_date===todayStr());
  else if(fd==="7"||fd==="30"){
    const lim = new Date(Date.now()-(+fd)*864e5).toISOString().slice(0,10);
    rows = rows.filter(x=>x.report_date>=lim);
  }
  // stats (jour courant, sur le filtre)
  const today = rows.filter(x=>x.report_date===todayStr());
  const expected = CONFIG.TEAM.length;
  const doneToday = new Set(CACHE.filter(x=>x.report_date===todayStr()).map(x=>x.member)).size;
  $("stats").innerHTML = `
    <div class="box"><div class="n">${doneToday}/${expected}</div><div class="l">EOD du jour</div></div>
    <div class="box"><div class="n">${rows.length}</div><div class="l">EOD affichés</div></div>`;

  const wrap = $("entries");
  if(!rows.length){ wrap.innerHTML = `<div class="empty">Aucun EOD pour ce filtre.</div>`; return; }
  wrap.innerHTML = rows.map(x=>{
    const fields = FORMS[x.role]||SETTER_FIELDS;
    const kvs = fields.map(f=>{
      const val = (x.payload&&x.payload[f.key]) ? x.payload[f.key] : "—";
      return `<div class="kv"><span class="k">${f.label}</span><span class="v">${escapeHtml(val)}</span></div>`;
    }).join("");
    const dd = new Date(x.report_date+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
    return `<div class="entry">
      <div class="eh">
        <span class="who">${escapeHtml(x.member)} <span class="pill ${x.role}">${ROLE_LABEL[x.role]||x.role}</span></span>
        <span class="when">${dd}</span>
      </div>${kvs}</div>`;
  }).join("");
}
$("fMember").addEventListener?.("change",renderDash);
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
document.addEventListener("change",e=>{ if(e.target.id==="fMember"||e.target.id==="fDate") renderDash(); });
</script>
</body>
</html>
